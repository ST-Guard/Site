  }

  function nextPage() {

    div_nextpage.style.display = "block";
    div_cadastro1.style.display = "none";

  }

  function cadastrar() {

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var cpf = input_cpf.value;
    var senha = input_senha.value;
    var nomeUsuario = input_nome.value;
    var email = input_email.value;
    var idGerente = sessionStorage.ID_USUARIO;
    // var dt = input_dt.value;
    // var servidor = input_servidor.value;


    // Verificando se há algum campo em branco
    if (cpf == "" || senha == "" || nomeUsuario == "" || email == "") {
      alert("Preencha todos os campos!");
      return;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        cpfServer: cpf,
        senhaServer: senha,
        nomeServer: nomeUsuario,
        emailServer: email,
        idGerenteServer: idGerente,
        // dtServer: dt,
        // servidorServer: servidor
      }),
    }
    )
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          alert('Cadastro realizado com sucesso! Redirecionando...');

          setTimeout(() => {
            window.location = "login.html";
          }, 2000);
        } else {
          alert("Houve um erro ao tentar realizar o cadastro!");
        }

      })

      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }
