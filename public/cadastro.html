        <h2>Crie sua conta</h2>

        <div class="st-formulario">

          <div class="st-campo">
            <label>Nome completo</label>
            <input id="input_nome" type="text" placeholder="Digite seu nome">
          </div>

          <div class="st-campo">
            <label>Email</label>
            <input id="input_email" type="email" placeholder="Digite seu e-mail">
          </div>

          <div class="st-campo">
            <label>Razao Social</label>
            <input id="input_razaoSocial" type="text" placeholder="Nome da empresa">
          </div>
          <div class="st-campo">
            <label>CNPJ</label>
            <input id="input_cnpj" type="text" placeholder="CNPJ">
          </div>

          <div class="st-campo">
            <label>Senha</label>
            <input id="input_senha" type="password" placeholder="Crie uma senha">
          </div>

          <div class="st-campo">
            <label>Confirmar senha</label>
            <input type="password" placeholder="Confirme a senha">
          </div>

          <button onclick="cadastrar()" class="st-botao">Cadastrar</button>

        </div>

      </div>
    </div>

  </section>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeEmpresa = input_razaoSocial.value;
    var cnpj = input_cnpj.value;
    var nomeUsuario = input_nome.value;
    var email = input_email.value;
    var senha = input_senha.value;
    // Verificando se há algum campo em branco
   if (nomeEmpresa == "" || cnpj == "" || nomeUsuario == "" || email == "" || senha == "") {
  alert("Preencha todos os campos!");
  return;
}

    // Enviando o valor da nova input
   fetch("/usuarios/cadastrarCompleto", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
  },
  body: JSON.stringify({
    nomeEmpresaServer: nomeEmpresa,
    cnpjServer: cnpj,
    nomeServer: nomeUsuario,
    emailServer: email,
    senhaServer: senha
  }),
}
  )
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          sessionStorage.ID_CAMPO
          alert('Dados salvos');

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de serviço...";

          setTimeout(() => {
            window.location = "../dashboard/dashboard.html";
          }, "2000");

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })

      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }
