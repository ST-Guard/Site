<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Data | Login</title>

  <script src="../js/sessao.js"></script>

  <link rel="icon" href="./assets/icon/favicon2.ico">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="icon" href="../assets/icon/icon.png">
  <link rel="icon" href="../assets/icon/icon.png">
  <link rel="stylesheet" href="./../css/login.css">
  <link rel="stylesheet" href="../css/modal.css">
</head>

<body>
  <div id="modal" style="display: none;">
    <div class="conteiner_modal">
      <header>
        <a href="index.html">
          <img src="../assets/logos/logo_modal.png" alt="">
        </a>
      </header>
      <div class="titulo">
        <p>Atenção:</p>
      </div>
      <div id="conteiner_msg">E-mail ou senha inválidos!</div>
      <div class="conteiner_barra">
        <div id="loading">
          <div id="preenchimento"></div>
        </div>
      </div>
    </div>
  </div>

  <main>

    <div class="conteiner_kpis">
      <div class="sombra">
        <div class="conteiner_logo">
          <a href="index.html">
            <img src="../assets/logos/smart data branco.png" alt="">
          </a>
        </div>
        <div class="conteiner_titulo">
          Monitoramento em tempo real de servidores e aplicações.
        </div>
        <div class="conteiner_boxes">
          <div class="box">
            <div class="icon">
              <img src="../assets/imgs_login/icon_servidorLogin.svg" alt="">
            </div>
            <div class="conteiner_infos">
              <div class="num">
                30
              </div>
              <div class="texto">
                Servidores ativos.
              </div>
            </div>
          </div>
          <div class="box">
            <div class="icon">
              <img src="../assets/imgs_login/icon_alertaLogin.svg" alt="">
            </div>
            <div class="conteiner_infos">
              <div class="num">
                26
              </div>
              <div class="texto">
                Alertas emitidos.
              </div>
            </div>
          </div>
          <div class="box">
            <div class="icon">
              <img src="../assets/imgs_login/icon_pranchetaLogin.svg" alt="">
            </div>
            <div class="conteiner_infos">
              <div class="num">
                90
              </div>
              <div class="texto">
                Relatórios gerados.
              </div>
            </div>
          </div>
          <div class="box">
            <div class="icon">
              <img src="../assets/imgs_login/icon_usersLogin.svg" alt="">
            </div>
            <div class="conteiner_infos">
              <div class="num">
                75
              </div>
              <div class="texto">
                Equipes.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="conteiner_forms">
      <div class="titulo">
        <h6>Bem vindo(a) de volta!</h6>
        <p>Acesse sua conta para monitorar seus servidores</p>
      </div>
      <div class="forms">
        <div class="area">
          <label for="">E-mail:</label>
          <div class="box_input">
            <img src="../assets/icon/emai_icon.png" alt="" class="icon">
            <input type="email" name="email" id="email_input" placeholder="seuemail@email.com">
          </div>
        </div>
        <div class="area">
          <label for="">Senha:</label>
          <div class="box_input">
            <img src="../assets/icon/password_icon.png" alt="" class="icon">
            <input type="password" name="senha" id="senha_input" placeholder="*********">
            <img src="../assets/icon/closed_eye_icon.png" alt="" class="eye" id="eye_closed" onclick="mostrarSenha()">
            <img src="../assets/icon/eye_icon.png" alt="" class="eye" id="eye" onclick="ocultarSenha()"
              style="display: none;">
          </div>
        </div>
      </div>
      <div class="esqueceu_senha">
        Esqueceu a senha?
      </div>
      <label class="checkBox_conectado">
        <input type="checkbox" id="manter-conectado">
        <span class="checkbox"></span>
        Manter-me conectado
      </label>
      <button onclick="entrar()">Entrar </button>
      <div class="divisoria">
        <hr>
        ou
        <hr>
      </div>
      <p>Não tem conta? <a href="index.html#fale_conosco">Solicite o acesso!</a></p>
    </div>
  </main>

</body>
<script src="../js/modal.js"></script>
<script>
  function mostrarSenha() {
    const eyeClosed = document.getElementById("eye_closed")
    const eye = document.getElementById("eye")
    const senha_input = document.getElementById("senha_input")
    eyeClosed.style.display = "none"
    eye.style.display = "block"
    senha_input.type = 'text';
  }
  function ocultarSenha() {
    const eyeClosed = document.getElementById("eye_closed")
    const eye = document.getElementById("eye")
    const senha_input = document.getElementById("senha_input")
    eyeClosed.style.display = "block"
    eye.style.display = "none"
    senha_input.type = 'password';
  }

  function entrar() {
    var email_input = document.getElementById("email_input");
    var senha_input = document.getElementById("senha_input");

    var senhaVar = senha_input.value;
    var emailVar = email_input.value;

    if (senhaVar == "" || emailVar == "") {
      modal.style.display = "flex"
      conteiner_msg.innerHTML = `Verifique se não há algum campo em branco!`
      loadingModal()
      return false;
    }

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar
      })
    }).then(function (resposta) {
      console.log("ESTOU NO THEN DO entrar()!")

      if (resposta.ok) {
        console.log(resposta);

        resposta.json().then(json => {
          console.log("Dados recebidos: ", json);
          //console.log(JSON.stringify(json));

          sessionStorage.ID_USUARIO = json.idUsuario;
          sessionStorage.NOME_USUARIO = json.nome;
          sessionStorage.EMAIL_USUARIO = json.email;
          sessionStorage.FK_PAPEL = json.fkPapel;
          sessionStorage.FK_EMPRESA = json.fkEmpresa;

          /*if (json.fkPapel == 1) {
            setTimeout(function () {
              window.location.href = '/pages/dashboard/dashboardGestor.html';
            }, 200);

          } else {
            setTimeout(function () {
              window.location.href = '/pages/dashboard/dashboardAnalista.html';
            }, 200);
          }*/

          if (json.fkPapel == 1) {
            window.location.href = 'inicioGestor.html';
          } else {
            window.location.href = 'dashAnalista.html';
          }
        });


      } else {

        //console.log("Houve um erro ao tentar realizar o login!");

        resposta.text().then(texto => {
          console.error("ERRO VINDO DO SERVIDOR: ", texto);
          modal.style.display = "flex"
          conteiner_msg.innerHTML = `Houve um erro ao tentar realizar o login!`
          loadingModal()
        });
      }

    }).catch(function (erro) {
      console.log(erro);
    })

    return false;
  }
</script>

</html>
