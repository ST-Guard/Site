<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Data | Analista</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./../assets/icon/icon.png">
    <link rel="stylesheet" href="./../css/dashboard.css" />
    <link rel="stylesheet" href="./../css/dashConfigGestor.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body onload="mascaraTel(document.getElementById('telefone'))">

    <header>
        <nav>
            <div class="logo-nav" onclick="fnNavegar('/')">
                <a href="../pages/index.html">
                    <img src="./../assets/logos/smart data branco.png" alt="">
                </a>
            </div>

            <div class="right-nav">
                <div class="logo-notificao">
                    <a href="dashAlertas.html">
                        <img src="./../assets/dashboard-icons/notificao.svg" alt="" />
                    </a>
                    <div class="qtd-notificao">
                        <img src="./../assets/dashboard-icons/circulo.svg" alt="">
                        <p class="qtd-notificao">10</p>
                    </div>
                </div>

                <div class="separacao"></div>

                <div class="logo-usuario">
                    <div class="userImg">
                        <a href="dashConfigGestor.html">
                            <img src="./../assets/dashboard-icons/cirucloUser.svg" alt="Usuário" id="imagemPerfilCima">
                        </a>
                    </div>
                    <div class="userInfo">
                        <h2 class="user-name" id="username">Matheus Valle</h2>
                        <h3 class="user-cargo" id="cargoname">Analista de operações</h3>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="corpoPagina">
        <div class="sidebar">
            <div class="sidebar-buttons">
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashGestor.html')">
                    <img src="../assets/dashboard-icons/icon_dashboard_azul.svg" alt="">
                    <p><a href="../pages/dashGestor.html">Dashboard</a></p>
                    <!-- <p onclick="mudarServidor()">Servidores</p> -->
                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashFinanceiro.html')">
                  <img src="../assets/dashFinanceiro/coin-icon-white.svg" alt="">
                  <p><a href="../pages/dashFinanceiro.html">Financeiro</a></p>
                  <!-- <p onclick="mudarDash()">Dashboard</p> -->
                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashServidorGestor.html')">
                    <img src="../assets/dashboard-icons/icon_servidores_branco.svg" alt="">
                    <p><a href="dashServidorGestor.html">Servidores</a></p>
                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashAlertas.html')">
                    <img src="../assets/dashboard-icons/icon_alerta_branco.svg" alt="">
                    <p><a href="dashAlertas.html">Alertas</a></p>
                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashFuncionario.html')">
                    <img src="../assets/dashboard-icons/icon_form_branco.svg" alt="">
                    <p><a href="dashFuncionario.html">Funcionários</a></p>
                </div>
                <div class="sidebar-button-select" onclick="fnNavegar('../pages/dashConfigGestor.html')">
                    <img src="../assets/dashboard-icons/icon_config_branco.svg" alt="">
                    <p><a href="dashConfigGestor">Configurações</a></p>
                </div>
                <div class="sidebar-button-sair">
                    <div class="saindo">
                        <a href="login.html" onclick="limparSessao()" class="sair">
                            <img src="../assets/dashboard-icons/sair.svg" alt="">
                            <p>Sair</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <div class="SubcorpoPagina">
            <div class="textoInicio">
                <div class="div_titulo">
                    <h1>Configurações</h1>
                </div>
            </div>
            <div class="containerConfig">
                <div class="boxInicio">
                    <h2>Perfil <span>Gestora</span></h2>
                    <h3>Atualize suas informações pessoais e de contato.</h3>
                </div>
                <div class="boxImagem">
                    <img src="../assets/dashConfig/usuario.png" id="imgPerfil"
                        onerror="this.src='../assets/dashConfig/usuario.png'">
                    <button onclick="mudarImagemPerfil()">Trocar foto</button>
                    <input type="file" id="inpImagem" onchange="salvarImagemPerfil()" hidden>
                </div>
                <div class="linha"></div>
                <div class="containerInputP1">
                    <div class="input1">
                        <div class="boxInput">
                            <span>Nome completo</span>
                            <input type="text" id="nome" value="Isabella Teixeira">
                        </div>
                        <div class="boxInput">
                            <span>Telefone</span>
                            <input type="text" id="telefone" value="11123456789" maxlength="15"
                                oninput="mascaraTel(this)">
                        </div>
                    </div>
                    <div class="input2">
                        <div class="boxInput">
                            <span>E-mail</span>
                            <input type="text" id="email" value="mywtty@gmail.com" disabled>
                        </div>
                        <div class="boxInput">
                            <span>Cargo</span>
                            <input type="text" id="cargo" value="Gestor" disabled>
                        </div>
                    </div>
                </div>
                <div class="boxTextArea">
                    <span>Bio</span>
                    <textarea id="bio"
                        placeholder="Responsável pelo monitoramento e disponibilidade dos servidores de produção."
                        disabled></textarea>
                </div>
                <div class="botaoSalvar">
                    <button onclick="salvar()"><img src="../assets/dashConfig/save.png" alt="">Salvar
                        alterações</button>
                </div>
            </div>

        </div>
    </div>
</body>
<script src="./../js/sessao.js"></script>
<script src="./../js/dashConfigGestor.js"></script>
</html>
