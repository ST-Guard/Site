<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Data | Cadastro funcionários</title>
    <link rel="icon" href="./../assets/icon/icon.png">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="./../css/dashFuncionario.css">
</head>

<body
    onload="mascaraTel(document.getElementById('input_telefone_cadastro')), mascaraCPF(document.getElementById('input_cpf_cadastro'))">
    <header>
        <nav>
            <div class="logo-nav" onclick="fnNavegar('/')">
                <a href="../pages/index.html">
                    <img src="./../assets/logos/smart data branco.png" alt="">
                </a>
            </div>

            <div class="right-nav">
                <div class="logo-notificao">
                    <div class="icon-notificao">
                        <a href="dashAlertas.html">
                            <img src="./../assets/dashboard-icons/notificao.svg" alt="" />
                        </a>
                    </div>
                    <div class="qtd-notificao">
                        <img src="./../assets/dashboard-icons/circulo.svg" alt="">
                        <p>10</p>
                    </div>
                </div>

                <div class="separacao"></div>

                <div class="logo-usuario">
                    <div class="userImg">
                        <a href="dashConfigGestor.html">
                            <img src="./../assets/dashboard-icons/cirucloUser.svg" alt="Usuário" id="imagemPerfilCima">
                        </a>
                    </div>
                    <div class="userInfo">
                        <h2 class="user-name" id="username">Matheus Valle</h2>
                        <h3 class="user-cargo" id="cargoname">Analista de operações</h3>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div class="corpoPagina">
        <div class="sidebar">
            <div class="sidebar-buttons">
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashGestor.html')">
                    <img src="../assets/dashboard-icons/icon_dashboard_azul.svg" alt="">
                    <p><a href="../pages/dashGestor.html">Dashboard</a></p>
                    <!-- <p onclick="mudarServidor()">Servidores</p> -->
                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashFinanceiro.html')">
                  <img src="../assets/dashFinanceiro/coin-icon-white.svg" alt="">
                  <p><a href="../pages/dashFinanceiro.html">Financeiro</a></p>
                  <!-- <p onclick="mudarDash()">Dashboard</p> -->
                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashServidorGestor.html')">
                    <img src="../assets/dashboard-icons/icon_servidores_branco.svg" alt="">
                    <p><a href="dashServidorGestor.html">Servidores</a></p>

                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashAlertas.html')">
                    <img src="../assets/dashboard-icons/icon_alerta_branco.svg" alt="">
                    <p><a href="dashAlertas.html">Alertas</a></p>

                </div>
                <div class="sidebar-button-select" onclick="fnNavegar('../pages/dashFuncionario.html')">
                    <img src="../assets/dashboard-icons/icon_form_branco.svg" alt="">
                    <p><a href="dashFuncionario.html">Funcionários</a></p>

                </div>
                <div class="sidebar-button" onclick="fnNavegar('../pages/dashConfigGestor.html')">
                    <img src="../assets/dashboard-icons/icon_config_branco.svg" alt="">
                    <p><a href="dashConfigGestor.html">Configurações</a></p>
                    <!-- <p onclick="mudarConfig()">Configurações</p> -->
                </div>
                <div class="sidebar-button-sair">
                    <div class="saindo">
                        <a href="login.html" onclick="limparSessao()" class="sair">
                            <img src="../assets/dashboard-icons/sair.svg" alt="">
                            <p>Sair</p>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="conteudo">
            <div class="conteudo_cabecalho">
                <h1 class="conteudo_titulo">Funcionários</h1>

                <div class="kpi">
                    <p class="kpi_ativos">Funcionários ativos</p>
                    <h2 id="kpi_ativos">0</h2>
                    <h4 id="kpi_inativos">0 Inativos</h4>
                    <img src="./../assets/img-funcionario/pessoas.png">
                </div>
            </div>

            <div class="card_busca">
                <div class="busca">
                    <img src="../assets/img-funcionario/lupa.png">
                    <input type="text" class="busca_input" placeholder="Buscar Funcionário...">
                </div>
                <button class="busca_botao_buscar">Buscar</button>
                <button class="busca_botao_cadastrar" onclick="abrirModal()">Cadastrar Funcionário +</button>
            </div>

            <div id="lista_funcionarios"></div>
        </div>
    </div>

    <div id="modal_cadastro" class="modal-container" style="display: none;">
        <div class="modal-conteudo">
            <div class="modal-header">
                <h2>Cadastro</h2>
                <button onclick="fecharModal()" class="botao-fechar">Fechar</button>
            </div>

            <div class="modal-corpo">
                <label>Nome do funcionário</label>
                <input id="input_nome_cadastro" placeholder="Ex: Matheus" value="Erick">

                <label>E-mail</label>
                <input id="input_email_cadastro" placeholder="matheus@gmail.com" value="erick@gmail.com">

                <label>Telefone</label>
                <input id="input_telefone_cadastro" placeholder="(11) 99999-8888" oninput="mascaraTel(this)"
                    maxlength="15" value="11987678789">

                <label>Senha</label>
                <input id="input_senha_cadastro" type="password" placeholder="******" value="123456">

                <label>CPF</label>
                <input id="input_cpf_cadastro" placeholder="000.000.000-00" oninput="mascaraCPF(this)" maxlength="14" value="11122233345">

                <label>Selecione a zona</label>
                <select id="select_zona_cadastro" required>
                    <option value="">Selecione</option>
                </select>

                <button onclick="cadastrar()" class="botao-cadastrar-modal">Cadastrar</button>
            </div>
        </div>
    </div>
</body>
<script src="./../js/dashFuncionario.js" defer></script>
</html>
