<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Dashboard · Monitoramento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
<div class="container-fluid py-3 px-lg-4 px-2">
    <div class="d-flex flex-wrap align-items-center justify-content-between mb-2">
        <h4 class="fw-bold mb-0" style="color: #0f2b4f;"><i style="color: #2e5aaf;"></i>ST Guard · Monitoramento</h4>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-4">
            <div class="cartao p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="rotulo-medicao"><i class="bi bi-cpu me-1"></i> CPU · Uso Total</span>
                    <span class="badge bg-light text-dark border-0 rounded-pill px-3 py-1">8 Núcleos</span>
                </div>
                <div class="d-flex align-baseline mt-2">
                    <span class="valor-grande" id="cpuValor">42</span><span class="unidade">%</span>
                </div>
                <div class="barra-progresso w-100 mt-2">
                    <div id="cpuBarra" class="barra-cpu" role="progressbar" style="width: 42%; height:8px; border-radius:20px;" aria-valuenow="42" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <div class="d-flex justify-content-between mt-2 small text-muted">
                    <span>Usuário 28%</span>
                    <span>Sistema 14%</span>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4">
            <div class="cartao p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="rotulo-medicao"><i class="bi bi-memory me-1"></i> RAM · 16 GB</span>
                    <span class="badge bg-light text-dark border-0 rounded-pill px-3 py-1">Disponível 9.2G</span>
                </div>
                <div class="d-flex align-baseline mt-2">
                    <span class="valor-grande" id="ramValor">6.8</span><span class="unidade">GB</span>
                </div>
                <div class="barra-progresso w-100 mt-2">
                    <div id="ramBarra" class="barra-ram" role="progressbar" style="width: 42.5%; height:8px; border-radius:20px;" aria-valuenow="43" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <div class="d-flex justify-content-between mt-2 small text-muted">
                    <span>Em cache 2.1G</span>
                    <span>Livre 9.2G</span>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4">
            <div class="cartao p-3 h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="rotulo-medicao"><i class="bi bi-hdd me-1"></i> DISCO · 512 GB</span>
                    <span class="badge bg-light text-dark border-0 rounded-pill px-3 py-1">SSD</span>
                </div>
                <div class="d-flex align-baseline mt-2">
                    <span class="valor-grande" id="discoValor">238</span><span class="unidade">GB</span>
                </div>
                <div class="barra-progresso w-100 mt-2">
                    <div id="discoBarra" class="barra-disco" role="progressbar" style="width: 46.5%; height:8px; border-radius:20px;" aria-valuenow="47" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <div class="d-flex justify-content-between mt-2 small text-muted">
                    <span>Em uso 238G</span>
                    <span>livre 274G</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
